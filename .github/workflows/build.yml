# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build Android and iOS Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Build web bundle (www/)
        run: npm run build

      - name: Sync Capacitor Android
        run: npm run sync:android

      # Senza questo step, Gradle genera un debug.keystore NUOVO e casuale ad
      # ogni run (nessuno ne persiste uno tra le VM effimere della CI): la SHA-1
      # dell'APK risultante non corrisponde MAI a quella registrata come client
      # OAuth Android su Google Cloud, e il login Google fallisce con
      # DEVELOPER_ERROR (a volte mostrato all'utente come un fuorviante
      # "Accesso annullato"). Ripristina qui lo STESSO keystore di debug usato
      # in locale (secret cifrato, mai nel repo) nel percorso di default che
      # Gradle usa già automaticamente per le build debug.
      - name: Restore debug keystore (Google Sign-In SHA-1 coerente con Google Cloud)
        run: |
          mkdir -p "$HOME/.android"
          echo "${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}" | base64 -d > "$HOME/.android/debug.keystore"

      - name: Build Android APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build web bundle (www/)
        run: npm run build

      - name: Sync Capacitor iOS
        run: npm run sync:ios

      - name: Build iOS App
        working-directory: ./ios/App
        run: |
          xcodebuild -project App.xcodeproj -scheme App -configuration Debug -sdk iphonesimulator -derivedDataPath build
      
      - name: Upload iOS Build
        uses: actions/upload-artifact@v7
        with:
          name: ios-build
          path: ios/App/build/Build/Products/Debug-iphonesimulator/App.app
